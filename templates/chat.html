<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Weather Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
        }

        .chat-box {
            min-height: 400px;
            background: #f9fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .message {
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            max-width: 70%;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .agent {
            background: #e9ecef;
            color: #222;
            margin-right: auto;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .send-btn {
            background: #007bff;
            color: white;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
            width: 100%;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌤️ Weather Assistant</h1>

        <div class="chat-box">
            {% if messages %}
                {% for msg in messages %}
                    {% if msg.type == 'human' %}
                        <div class="message user">
                            {{ msg.content }}
                        </div>
                    {% elif msg.type == 'ai' %}
                        <div class="message agent">
                            {{ msg.content }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% else %}
                <p style="color: #999; text-align: center;">
                    Ask me about the weather!
                </p>
            {% endif %}
        </div>

        <form method="POST" action="/send" class="input-form" id="chatForm">
            <input
                type="text"
                name="message"
                placeholder="Ask about the weather..."
                autocomplete="off"
                required
            >
            <button type="submit" class="send-btn">Send</button>
        </form>

        <a href="/clear">
            <button type="button" class="clear-btn">
                New Conversation
            </button>
        </a>
    </div>
</body>
</html>
